[pytest]
# Pytest configuration for the blog application

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode
asyncio_mode = auto

# Markers for test categorization
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    auth: marks tests as authentication related
    posts: marks tests as posts related
    comments: marks tests as comments related
    admin: marks tests as admin related
    slow: marks tests as slow (deselect with '-m "not slow"')

# Test output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Minimum Python version
minversion = 3.8

# Test paths
testpaths = tests

# Timeout for tests (in seconds)
timeout = 30
